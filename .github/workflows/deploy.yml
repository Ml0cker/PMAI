name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          script: |
            cd /opt/pmai
            git pull origin main || true
            cd docker
            cat > .env << EOF
            POSTGRES_USER=pmai
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=pmai
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            SOLANA_RPC_URL=${{ secrets.SOLANA_RPC_URL }}
            BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}
            PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}
            EOF
            # Use docker compose v2 plugin or fallback to docker-compose v1
            if docker compose version &>/dev/null; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi
            $DC down || true
            sleep 2
            $DC up -d --build
            sleep 5
            $DC ps
