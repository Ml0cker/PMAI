name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 25m
          script: |
            cd /opt/pmai
            git pull origin main || true
            cd docker

            # Write .env file — one var per line to avoid any shell expansion
            echo "POSTGRES_USER=pmai" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=pmai" >> .env
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
            echo "SOLANA_RPC_URL=${{ secrets.SOLANA_RPC_URL }}" >> .env
            echo "BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}" >> .env
            echo "PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}" >> .env

            echo "=== .env keys ==="
            cut -d= -f1 .env

            echo "=== OPENROUTER_API_KEY line in .env ==="
            grep OPENROUTER .env | awk -F= '{print "key present, value length:", length($2)}'

            # Use docker compose v2 plugin or fallback to docker-compose v1
            if docker compose version &>/dev/null; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            $DC down || true
            sleep 2
            $DC up -d --build
            sleep 10

            echo "=== Container status ==="
            $DC ps

            echo "=== API container env check ==="
            docker exec pmai-api sh -c 'echo "OPENROUTER_API_KEY length: $(printenv OPENROUTER_API_KEY | wc -c)"' 2>/dev/null || echo "Container not ready"

            echo "=== API health check ==="
            curl -s http://localhost:4000/api/predictions/debug/env 2>/dev/null || echo "API not responding yet"
