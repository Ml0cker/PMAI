name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          script: |
            cd /opt/pmai

            echo ">>> Creating .env file..."
            cat > .env << 'ENVEOF'
NODE_ENV=production
LOG_LEVEL=info
POSTGRES_USER=pmai
POSTGRES_DB=pmai
REDIS_URL=redis://redis:6379
API_PORT=4000
SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
ENVEOF

            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "DATABASE_URL=postgresql://pmai:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/pmai" >> .env
            echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env
            echo "FRONTEND_URL=https://${{ secrets.DOMAIN }}" >> .env
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
            echo "BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}" >> .env
            echo "PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}" >> .env
            echo "NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}/api" >> .env
            echo "NEXT_PUBLIC_WS_URL=wss://${{ secrets.DOMAIN }}/ws" >> .env
            echo "NEXT_PUBLIC_SOLANA_RPC_URL=https://api.mainnet-beta.solana.com" >> .env

            echo ">>> Verifying .env file..."
            grep OPENROUTER_API_KEY .env | cut -c1-40

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Copying .env to docker directory..."
            cp .env docker/.env

            # Use docker-compose or docker compose depending on what's installed
            if command -v docker-compose &> /dev/null; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo ">>> Stopping containers..."
            cd docker
            $COMPOSE down || true

            echo ">>> Building images..."
            $COMPOSE build

            echo ">>> Starting containers in background..."
            nohup $COMPOSE up -d > /tmp/docker-up.log 2>&1 &

            echo ">>> Waiting for containers to start..."
            sleep 30

            echo ">>> Verifying containers are running..."
            $COMPOSE ps

            RUNNING=$($COMPOSE ps | grep -c "Up" || echo "0")
            echo "Found $RUNNING running containers"

            if [ "$RUNNING" -lt "6" ]; then
              echo "ERROR: Not all containers started"
              cat /tmp/docker-up.log || true
              exit 1
            fi

            echo ">>> Running DB migrations..."
            $COMPOSE exec -T api \
              npx prisma db push --schema=packages/db/prisma/schema.prisma --accept-data-loss 2>/dev/null || true

            echo ">>> Cleaning old images..."
            cd /opt/pmai
            docker image prune -f

            echo ">>> Done!"
            cd docker
            $COMPOSE ps

            echo ">>> Checking worker-ai logs for API key..."
            $COMPOSE logs worker-ai | grep -i "openrouter\|apikey\|haskey" | tail -20 || echo "No relevant logs found"

            echo ">>> Checking api logs for API key..."
            $COMPOSE logs api | grep -i "openrouter\|apikey\|predictiongenerator" | tail -20 || echo "No relevant logs found"
