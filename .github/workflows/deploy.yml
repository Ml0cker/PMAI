name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 25m
          script: |
            # Clone repo if not exists, otherwise pull latest
            if [ ! -d /opt/pmai/.git ]; then
              echo "=== Cloning repository ==="
              rm -rf /opt/pmai
              git clone https://github.com/Ml0cker/PMAI.git /opt/pmai
            else
              echo "=== Pulling latest ==="
              cd /opt/pmai
              git pull origin main || true
            fi

            cd /opt/pmai/docker

            # Write .env file — one var per line to avoid any shell expansion
            echo "POSTGRES_USER=pmai" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=pmai" >> .env
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
            echo "SOLANA_RPC_URL=${{ secrets.SOLANA_RPC_URL }}" >> .env
            echo "BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}" >> .env
            echo "PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}" >> .env

            echo "=== .env keys ==="
            cut -d= -f1 .env

            echo "=== OPENROUTER_API_KEY line in .env ==="
            grep OPENROUTER .env | awk -F= '{print "key present, value length:", length($2)}'

            # Use docker compose v2 plugin or fallback to docker-compose v1
            if docker compose version &>/dev/null; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            $DC down || true

            echo "=== Cleaning Docker to free disk space ==="
            docker system prune -af --volumes 2>/dev/null || true

            echo "=== Disk space after prune ==="
            df -h /

            # If still low on space, remove unused system packages
            if [ "$(df / | tail -1 | awk '{print $4}')" -lt 500000 ]; then
              echo "=== Very low disk, aggressive cleanup ==="
              apt-get clean 2>/dev/null || true
              rm -rf /tmp/* 2>/dev/null || true
              journalctl --vacuum-time=1s 2>/dev/null || true
              docker builder prune -af 2>/dev/null || true
            fi

            echo "=== Disk space after cleanup ==="
            df -h /

            sleep 2
            $DC up -d --build

            echo "=== Waiting for containers to start ==="
            for i in $(seq 1 12); do
              sleep 5
              if docker exec pmai-api printenv NODE_ENV 2>/dev/null; then
                echo "API container ready after $((i*5))s"
                break
              fi
              echo "Waiting... ($((i*5))s)"
            done

            echo "=== Container status ==="
            $DC ps

            echo "=== API container env check ==="
            docker exec pmai-api printenv OPENROUTER_API_KEY 2>/dev/null | awk '{print "length:", length, "prefix:", substr($0,1,10)}' || echo "KEY NOT FOUND"

            echo "=== API health check ==="
            curl -s http://localhost:4000/api/predictions/debug/env 2>/dev/null || echo "API not responding yet"
