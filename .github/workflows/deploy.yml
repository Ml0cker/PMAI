name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          script: |
            cd /opt/pmai
            echo ">>> Current directory: $(pwd)"
            echo ">>> Disk space:"
            df -h /opt/pmai
            echo ">>> Docker status:"
            docker ps
            echo ">>> Git status:"
            git status
            echo ">>> Test complete!"
