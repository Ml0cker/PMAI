name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 25m
          script: |
            cd /opt/pmai
            git pull origin main || true
            cd docker

            # Write .env file
            printf '%s\n' \
              "POSTGRES_USER=pmai" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              "POSTGRES_DB=pmai" \
              "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
              "SOLANA_RPC_URL=${{ secrets.SOLANA_RPC_URL }}" \
              "BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}" \
              "PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}" \
              > .env

            echo "=== .env keys ==="
            cut -d= -f1 .env

            # Use docker compose v2 plugin or fallback to docker-compose v1
            if docker compose version &>/dev/null; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            $DC down || true
            sleep 2

            # Pass secrets as shell env vars so docker-compose ${VAR} substitution works
            export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
            export SOLANA_RPC_URL="${{ secrets.SOLANA_RPC_URL }}"
            export BAGS_MINT_ADDRESS="${{ secrets.BAGS_MINT_ADDRESS }}"
            export PLATFORM_WALLET_ADDRESS="${{ secrets.PLATFORM_WALLET_ADDRESS }}"

            $DC up -d --build
            sleep 10

            echo "=== Container status ==="
            $DC ps

            echo "=== Verify API container has OPENROUTER_API_KEY ==="
            docker exec pmai-api printenv OPENROUTER_API_KEY 2>/dev/null | awk '{print "length:", length, "prefix:", substr($0,1,10)}' || echo "ERROR: key not found in container"
