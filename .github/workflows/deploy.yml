name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 25m
          script: |
            # Clone repo if not exists, otherwise pull latest
            if [ ! -d /opt/pmai/.git ]; then
              echo "=== Cloning repository ==="
              rm -rf /opt/pmai
              git clone https://github.com/Ml0cker/PMAI.git /opt/pmai
            else
              echo "=== Pulling latest ==="
              cd /opt/pmai
              git pull origin main || true
            fi

            cd /opt/pmai/docker

            # Write .env file
            echo "POSTGRES_USER=pmai" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=pmai" >> .env
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
            echo "SOLANA_RPC_URL=${{ secrets.SOLANA_RPC_URL }}" >> .env
            echo "BAGS_MINT_ADDRESS=${{ secrets.BAGS_MINT_ADDRESS }}" >> .env
            echo "PLATFORM_WALLET_ADDRESS=${{ secrets.PLATFORM_WALLET_ADDRESS }}" >> .env

            echo "=== .env keys ==="
            cut -d= -f1 .env

            # Login to GHCR to pull images
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Ml0cker --password-stdin 2>&1 || echo "GHCR login failed"

            # Pull latest images
            echo "=== Pulling images ==="
            docker pull ghcr.io/ml0cker/pmai-api:latest
            docker pull ghcr.io/ml0cker/pmai-frontend:latest

            # Use docker compose v2 plugin or fallback to docker-compose v1
            if docker compose version &>/dev/null; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            $DC down || true
            sleep 2
            $DC up -d

            echo "=== Waiting for containers ==="
            for i in $(seq 1 12); do
              sleep 5
              if docker exec pmai-api printenv NODE_ENV 2>/dev/null; then
                echo "API container ready after $((i*5))s"
                break
              fi
              echo "Waiting... ($((i*5))s)"
            done

            echo "=== Container status ==="
            $DC ps

            echo "=== API env check ==="
            docker exec pmai-api printenv OPENROUTER_API_KEY 2>/dev/null | awk '{print "length:", length, "prefix:", substr($0,1,10)}' || echo "KEY NOT FOUND"

            echo "=== API health check ==="
            curl -s http://localhost:4000/api/predictions/debug/env 2>/dev/null || echo "API not responding yet"
